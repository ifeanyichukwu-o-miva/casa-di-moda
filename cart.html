<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Casa di Moda | Cart</title>

    <link rel="shortcut icon" href="./assets/favicon.ico" type="image/x-icon" />

    <!--STYLES-->
    <link rel="stylesheet" href="./styles/global.css" />
    <link rel="stylesheet" href="./styles/cart.css" />
  </head>
  <body>
    <main class="bg-gray50">
      <div class="body-container flex-row gap-24">
        <!-- Content goes here -->

        <!--CART LIST-->
        <section class="cart-list bg-white flex flex-column gap-32 rd-8">
          <h3 class="semibold color-black">
            My Cart (<span id="cart_items_count"></span>)
          </h3>

          <div id="cart_items" class="flex flex-column gap-32">
            <!--IF NOT CART ITEM-->
            <div class="no-item-in-cart flex flex-column flex-center gap-24">
              <i
                data-lucide="circle-slash-2"
                class="lucide-icon"
                width="64px"
                height="64px"
                stroke-width="1.3px"
                color="var(--color-gray100)"
              ></i>

              <div class="flex flex-column flex-center gap-8">
                <h4 class="medium color-gray200">NO ITEM IN CART</h4>
                <p class="p14 regular color-gray200">
                  You have not added any wear or accessories to your cart yet.
                  Click the button below to add some.
                </p>
                <a href="./products.html">
                  <button class="bg-primary-faded color-primary p14 medium">
                    Explore Collections
                  </button>
                </a>
              </div>
            </div>
          </div>
        </section>

        <!--ORDER SUMMARY-->
        <section class="order-summary bg-white flex flex-column gap-32 rd-8">
          <h3 class="semibold color-black">Order Summary</h3>

          <div class="flex flex-column gap-8">
            <div class="flex align-center space-between">
              <p class="p14 regular color-gray200">Subtotal</p>
              <p class="p16 medium color-black">
                ₦ <span id="order_subtotal">120,000</span>
              </p>
            </div>

            <div class="flex align-center space-between">
              <p class="p14 regular color-gray200">Delivery Fee</p>
              <p class="p16 medium color-black">
                ₦ <span id="order_delivery_fee">3,500</span>
              </p>
            </div>

            <div class="flex align-center space-between">
              <p class="p14 regular color-gray200">Tax</p>
              <p class="p16 medium color-black">
                - ₦ <span id="order_tax">50</span>
              </p>
            </div>

            <div class="seperator"></div>

            <!--TOTAL-->
            <div class="flex align-center space-between">
              <p class="p16 medium color-gray200">Total</p>
              <h4 class="medium color-black">
                ₦ <span id="order_total">120,000</span>
              </h4>
            </div>
          </div>

          <button
            id="checkout_btn"
            class="bg-primary color-white p14 medium flex flex-center gap-8 rd-8"
          >
            Proceed to Checkout
            <i
              data-lucide="arrow-right"
              class="lucide-icon"
              width="24"
              height="24"
              stroke-width="1.3px"
              color="var(--color-white)"
            ></i>
          </button>
        </section>

        <!-- End of body container -->
      </div>
    </main>

    <!--SCRIPTS-->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module" src="./scripts/nf-loader.js"></script>
    <script type="module" src="./scripts/cart.js"></script>
  </body>
</html>
